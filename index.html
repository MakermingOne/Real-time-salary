<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>实时工资</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000;
      --bg-secondary: #1c1c1e;
      --text-primary: #fff;
      --text-secondary: #8e8e93;
      --accent: #34c759;
      --card-bg: rgba(255,255,255,0.1);
      --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Noto Sans SC', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .app-container { display: flex; height: 100vh; }

    .settings-panel {
      width: 400px;
      min-width: 400px;
      background: var(--bg-secondary);
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .settings-panel h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 14px 16px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }

    .form-group input:focus { border-color: var(--accent); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .radio-group { display: flex; gap: 12px; flex-wrap: wrap; }

    .radio-option {
      flex: 1;
      min-width: 80px;
      position: relative;
    }

    .radio-option input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }

    .radio-option label {
      display: block;
      padding: 12px 10px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
    }

    .radio-option input:checked + label {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-secondary { background: var(--card-bg); }

    .effect-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .effect-btn {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      border: 2px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: transform 0.2s;
      background: #222;
    }

    .effect-btn:hover { transform: scale(1.05); }
    .effect-btn.active { border-color: var(--accent); }

    .label-row { display: flex; align-items: center; justify-content: space-between; }

    .help-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text-secondary);
      color: var(--bg-secondary);
      font-size: 12px;
      font-weight: bold;
      cursor: help;
      margin-left: 8px;
      position: relative;
    }

    .help-tooltip {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 8px;
      padding: 12px;
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-primary);
      width: 260px;
      text-align: left;
      z-index: 1000;
      display: none;
      line-height: 1.5;
    }

    .help-icon:hover .help-tooltip { display: block; }

    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .preview-panel .time-display {
      font-size: 24px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .preview-panel .date-display {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 60px;
    }

    .preview-panel .coin-icon {
      width: 120px;
      height: 120px;
      margin-bottom: 30px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .preview-panel .amount-display {
      font-size: 72px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
    }

    .preview-panel .rate-display {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 50px;
    }

    .preview-panel .status-bar {
      display: flex;
      gap: 30px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .preview-panel .status-item { display: flex; align-items: center; gap: 6px; }

    .preview-panel .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .fullscreen-mode .settings-panel { display: none; }
    .fullscreen-mode .preview-panel { width: 100vw; }

    .back-btn, .fullscreen-btn {
      position: fixed;
      width: 44px;
      height: 44px;
      background: var(--card-bg);
      border: none;
      border-radius: 50%;
      color: var(--text-primary);
      font-size: 20px;
      cursor: pointer;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .back-btn.active, .fullscreen-btn.active { display: flex; }
    .back-btn { top: 20px; left: 20px; }
    .fullscreen-btn { top: 20px; right: 20px; }

    .screen-saver-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .falling-item {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      animation: fall 8s linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-40px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0.3; }
    }

    .salary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      margin-bottom: 40px;
      font-size: 14px;
    }

    .salary-item {
      text-align: center;
      padding: 10px;
    }

    .salary-label {
      color: var(--text-secondary);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .salary-value {
      font-size: 24px;
      font-weight: bold;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .progress-bar-container {
      width: 100%;
      max-width: 300px;
      padding: 0 20px;
      margin-bottom: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.1s linear;
      border-radius: 3px;
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
      text-align: center;
    }

    .sound-toggle {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sound-toggle input[type="checkbox"] {
      width: 50px;
      height: 28px;
      appearance: none;
      background: var(--card-bg);
      border-radius: 14px;
      position: relative;
      cursor: pointer;
    }

    .sound-toggle input[type="checkbox"]::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.3s;
    }

    .sound-toggle input[type="checkbox"]:checked { background: var(--accent); }
    .sound-toggle input[type="checkbox"]:checked::after { transform: translateX(22px); }

    @media (max-width: 900px) {
      .app-container { flex-direction: column; }
      .settings-panel { width: 100%; height: auto; max-height: 50vh; }
      .preview-panel { padding: 20px; }
      .preview-panel .coin-icon { width: 80px; height: 80px; }
      .preview-panel .amount-display { font-size: 48px; }
    }

    @media (max-width: 480px) {
      .settings-panel { padding: 16px; }
      .preview-panel .coin-icon { width: 60px; height: 60px; }
      .preview-panel .amount-display { font-size: 36px; }
      .preview-panel .time-display { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="app-container" id="appContainer">
    <div class="settings-panel">
      <h2>💰 实时工资</h2>
      
      <div class="form-group">
        <label>月薪</label>
        <div class="form-row">
          <input type="number" id="monthlySalary" value="10000" style="flex: 2;">
          <select id="currency" style="flex: 1;">
            <option value="CNY">人民币 (¥)</option>
            <option value="USD">美元 ($)</option>
          </select>
        </div>
      </div>
      
      <div class="form-group">
        <div class="label-row">
          <label>收入计算方式</label>
          <div class="help-icon">?
            <div class="help-tooltip">
              <p><strong>24小时计算：</strong>月薪÷当月自然天数÷86400秒，从0点开始计算。</p>
              <p><strong>工作时间计算：</strong>仅在上班时间计算收入，周末和午休不计算。</p>
            </div>
          </div>
        </div>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" name="calcMode" id="calc24h" value="24h" checked>
            <label for="calc24h">24小时</label>
          </div>
          <div class="radio-option">
            <input type="radio" name="calcMode" id="calcWork" value="work">
            <label for="calcWork">工作时间</label>
          </div>
        </div>
      </div>
      
      <div id="workTimeSettings" style="display: none;">
        <div class="form-row">
          <div class="form-group">
            <label>上班</label>
            <input type="time" id="workStartTime" value="09:30">
          </div>
          <div class="form-group">
            <label>下班</label>
            <input type="time" id="workEndTime" value="19:00">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>午休开始</label>
            <input type="time" id="lunchStartTime" value="12:30">
          </div>
          <div class="form-group">
            <label>午休结束</label>
            <input type="time" id="lunchEndTime" value="14:00">
          </div>
        </div>
        <div class="form-group">
          <label>工作日</label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" name="workDays" id="workDaysDoubleRest" value="double" checked>
              <label for="workDaysDoubleRest">双休</label>
            </div>
            <div class="radio-option">
              <input type="radio" name="workDays" id="workDaysSingleRest" value="single">
              <label for="workDaysSingleRest">单休</label>
            </div>
            <div class="radio-option">
              <input type="radio" name="workDays" id="workDaysCustom" value="custom">
              <label for="workDaysCustom">自定义</label>
            </div>
          </div>
        </div>
        <div class="form-group" id="customWorkDays" style="display: none;">
          <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 40px;">
              <input type="checkbox" id="day0" value="0" checked>
              <label for="day0" style="display: inline; font-size: 12px; margin-left: 4px;">日</label>
            </div>
            <div style="flex: 1; min-width: 40px;">
              <input type="checkbox" id="day1" value="1" checked>
              <label for="day1" style="display: inline; font-size: 12px; margin-left: 4px;">一</label>
            </div>
            <div style="flex: 1; min-width: 40px;">
              <input type="checkbox" id="day2" value="2" checked>
              <label for="day2" style="display: inline; font-size: 12px; margin-left: 4px;">二</label>
            </div>
            <div style="flex: 1; min-width: 40px;">
              <input type="checkbox" id="day3" value="3" checked>
              <label for="day3" style="display: inline; font-size: 12px; margin-left: 4px;">三</label>
            </div>
            <div style="flex: 1; min-width: 40px;">
              <input type="checkbox" id="day4" value="4" checked>
              <label for="day4" style="display: inline; font-size: 12px; margin-left: 4px;">四</label>
            </div>
            <div style="flex: 1; min-width: 40px;">
              <input type="checkbox" id="day5" value="5" checked>
              <label for="day5" style="display: inline; font-size: 12px; margin-left: 4px;">五</label>
            </div>
            <div style="flex: 1; min-width: 40px;">
              <input type="checkbox" id="day6" value="6" checked>
              <label for="day6" style="display: inline; font-size: 12px; margin-left: 4px;">六</label>
            </div>
          </div>
        </div>
      </div>
      

      
      <div class="form-group">
        <div class="label-row" style="margin-bottom: 8px;">
          <label>背景特效</label>
          <div class="sound-toggle" style="margin-bottom: 0;">
            <input type="checkbox" id="effectEnabled" checked>
            <span>启用背景特效</span>
          </div>
        </div>
        <div class="effect-selector">
          <div class="effect-btn active" data-effect="coin-svg" title="金币雨">
            <svg width="28" height="28" viewBox="0 0 100 100">
              <defs>
                <linearGradient id="coinGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#FFD700"/>
                  <stop offset="50%" style="stop-color:#FFA500"/>
                  <stop offset="100%" style="stop-color:#FFD700"/>
                </linearGradient>
              </defs>
              <circle cx="50" cy="50" r="45" fill="url(#coinGradient2)" stroke="#DAA520" stroke-width="2"/>
              <circle cx="50" cy="50" r="35" fill="none" stroke="#DAA520" stroke-width="1" stroke-dasharray="5,3"/>
              <text x="50" y="60" text-anchor="middle" font-size="32" font-weight="bold" fill="#8B4513">¥</text>
            </svg>
          </div>
          <div class="effect-btn" data-effect="cny-rain" title="金币符号雨">¥</div>
          <div class="effect-btn" data-effect="usd-rain" title="美元雨">$</div>
          <div class="effect-btn" data-effect="sparkle" title="星光">✨</div>
          <div class="effect-btn" data-effect="glow" title="光芒">🌟</div>
          <div class="effect-btn" data-effect="bubble" title="气泡">🔮</div>
        </div>
      </div>
      
      <div class="form-group">
        <label>金币音效</label>
        <div class="sound-toggle">
          <input type="checkbox" id="soundEnabled" checked>
          <span>启用音效</span>
        </div>
      </div>
      
      <div class="form-group" id="stepGroup">
        <label>触发金额</label>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" name="soundStep" id="step10" value="10" checked>
            <label for="step10">¥10</label>
          </div>
          <div class="radio-option">
            <input type="radio" name="soundStep" id="step50" value="50">
            <label for="step50">¥50</label>
          </div>
          <div class="radio-option">
            <input type="radio" name="soundStep" id="step100" value="100">
            <label for="step100">¥100</label>
          </div>
        </div>
      </div>
      
      <button class="btn" id="completeBtn">完成设置</button>
      <button class="btn btn-secondary" id="screensaverBtn">进入屏保</button>
    </div>
    
    <div class="preview-panel" id="previewPanel">
      <div class="time-display" id="timeDisplay">09:00:00</div>
      <div class="date-display" id="dateDisplay">2024年1月1日 星期一</div>
      
      <svg class="coin-icon" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD700"/>
            <stop offset="50%" style="stop-color:#FFA500"/>
            <stop offset="100%" style="stop-color:#FFD700"/>
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="45" fill="url(#coinGradient)" stroke="#DAA520" stroke-width="2"/>
        <circle cx="50" cy="50" r="35" fill="none" stroke="#DAA520" stroke-width="1" stroke-dasharray="5,3"/>
        <text x="50" y="58" text-anchor="middle" font-size="24" font-weight="bold" fill="#8B4513">¥</text>
      </svg>
      
      <div class="amount-display" id="amountDisplay">¥0.00</div>
      <div class="rate-display" id="rateDisplay">每秒收入 ¥0.0000</div>
      
      <div id="salaryGrid" class="salary-grid" style="display: none;">
        <div class="salary-item">
          <div class="salary-label">秒薪</div>
          <div class="salary-value" id="secondSalary">¥0.00</div>
        </div>
        <div class="salary-item">
          <div class="salary-label">时薪</div>
          <div class="salary-value" id="hourSalary">¥0.00</div>
        </div>
        <div class="salary-item">
          <div class="salary-label">日薪</div>
          <div class="salary-value" id="daySalary">¥0.00</div>
        </div>
        <div class="salary-item">
          <div class="salary-label">月薪</div>
          <div class="salary-value" id="monthSalary">¥0.00</div>
        </div>
      </div>

      <div id="progressContainer" class="progress-bar-container" style="display: none;">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" id="progressLabel">已工作 0 小时 0 分</div>
      </div>
      
      <div class="status-bar">
        <div class="status-item">
          <div class="status-dot"></div>
          <span>实时计算中</span>
        </div>
        <div class="status-item" id="workStatus">已工作 0 小时 0 分</div>
        <div class="status-item" id="calcModeDisplay">24小时</div>
      </div>
    </div>
  </div>
  
  <button class="back-btn" id="backBtn">←</button>
  <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>
  <div class="screen-saver-hint" id="screensaverHint">按 ESC 退出</div>

  <script>
    let settings = {
      monthlySalary: 10000,
      currency: 'CNY',
      workStartTime: '09:30',
      workEndTime: '19:00',
      lunchStartTime: '12:30',
      lunchEndTime: '14:00',
      calcMode: '24h',
      workDays: 'double', // 工作日选择：double(双休), single(单休), custom(自定义)
      customWorkDays: [1,2,3,4,5], // 自定义工作日 0-6 对应周日-周六
      bgEffect: 'coin-svg',
      effectEnabled: true,
      soundEnabled: true,
      soundStep: 10
    };

    let updateInterval = null;
    let isRunning = false;
    let lastEarned = 0;
    let audioContext = null;
    let effectInterval = null;

    const appContainer = document.getElementById('appContainer');
    const soundEnabledEl = document.getElementById('soundEnabled');
    const workTimeSettings = document.getElementById('workTimeSettings');
    const effectEnabledEl = document.getElementById('effectEnabled');

    const effectItems = {
      'coin-svg': 'svg',
      'cny-rain': '¥',
      'usd-rain': '$',
      'sparkle': '✨',
      'glow': '🌟',
      'bubble': '🔮'
    };

    document.querySelectorAll('input[name="calcMode"]').forEach(radio => {
      radio.addEventListener('change', () => {
        workTimeSettings.style.display = radio.value === 'work' ? 'block' : 'none';
        settings.calcMode = radio.value;
        if (!isRunning) updateDisplay();
      });
    });

    // 工作日选择事件监听
    document.querySelectorAll('input[name="workDays"]').forEach(radio => {
      radio.addEventListener('change', () => {
        settings.workDays = radio.value;
        const customDiv = document.getElementById('customWorkDays');
        customDiv.style.display = radio.value === 'custom' ? 'block' : 'none';
      });
    });

    // 自定义工作日选择
    for (let i = 0; i < 7; i++) {
      const checkbox = document.getElementById(`day${i}`);
      if (checkbox) {
        checkbox.addEventListener('change', () => {
          settings.customWorkDays = [];
          for (let j = 0; j < 7; j++) {
            const cb = document.getElementById(`day${j}`);
            if (cb && cb.checked) settings.customWorkDays.push(j);
          }
        });
      }
    }

    soundEnabledEl.addEventListener('change', () => {
      settings.soundEnabled = soundEnabledEl.checked;
    });

    document.querySelectorAll('input[name="soundStep"]').forEach(radio => {
      radio.addEventListener('change', () => {
        settings.soundStep = parseInt(radio.value);
      });
    });

    document.querySelectorAll('.effect-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.effect-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        settings.bgEffect = btn.dataset.effect;
        if (!settings.effectEnabled) return;
        if (!isRunning) {
          stopEffect();
          startEffect();
        }
      });
    });

    // 背景特效开关逻辑
    effectEnabledEl.addEventListener('change', () => {
      settings.effectEnabled = effectEnabledEl.checked;
      if (!settings.effectEnabled) {
        stopEffect();
        settings.bgEffect = 'none';
      } else {
        // 恢复为金币雨
        settings.bgEffect = document.querySelector('.effect-btn.active')?.dataset.effect || 'cny-rain';
        if (!isRunning) {
          stopEffect();
          startEffect();
        }
      }
    });

    document.querySelectorAll('#appContainer input, #appContainer select').forEach(input => {
      input.addEventListener('change', updateSettings);
      input.addEventListener('input', updateSettings);
    });

    function updateSettings() {
      settings.monthlySalary = parseFloat(document.getElementById('monthlySalary').value) || 10000;
      settings.currency = document.getElementById('currency').value;
      settings.workStartTime = document.getElementById('workStartTime').value || '09:30';
      settings.workEndTime = document.getElementById('workEndTime').value || '19:00';
      settings.lunchStartTime = document.getElementById('lunchStartTime').value || '12:30';
      settings.lunchEndTime = document.getElementById('lunchEndTime').value || '14:00';
      settings.calcMode = document.querySelector('input[name="calcMode"]:checked').value;
      settings.workDays = document.querySelector('input[name="workDays"]:checked').value;
      
      workTimeSettings.style.display = settings.calcMode === 'work' ? 'block' : 'none';
      if (!isRunning) updateDisplay();
    }

    document.getElementById('completeBtn').addEventListener('click', startFullscreen);
    document.getElementById('screensaverBtn').addEventListener('click', startScreensaver);
    document.getElementById('backBtn').addEventListener('click', stopFullscreen);
    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isRunning) {
        if (document.fullscreenElement) document.exitFullscreen();
        stopFullscreen();
      }
    });

    function playCoinSound() {
      if (!settings.soundEnabled) return;
      try {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.setValueAtTime(880, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1760, audioContext.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + 0.3);
      } catch(e) {}
    }

    function createFallingItem() {
      const item = document.createElement('div');
      item.className = 'falling-item';
      if (settings.bgEffect === 'coin-svg') {
        item.innerHTML = `<svg width="36" height="36" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="coinGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#FFD700"/>
              <stop offset="50%" style="stop-color:#FFA500"/>
              <stop offset="100%" style="stop-color:#FFD700"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="45" fill="url(#coinGradient3)" stroke="#DAA520" stroke-width="2"/>
          <circle cx="50" cy="50" r="35" fill="none" stroke="#DAA520" stroke-width="1" stroke-dasharray="5,3"/>
          <text x="50" y="60" text-anchor="middle" font-size="32" font-weight="bold" fill="#8B4513">¥</text>
        </svg>`;
      } else {
        const char = effectItems[settings.bgEffect] || '¥';
        item.textContent = char;
      }
      item.style.left = Math.random() * (window.innerWidth - 30) + 'px';
      item.style.top = '-40px';
      item.style.fontSize = (20 + Math.random() * 20) + 'px';
      // 金币符号和美元符号都用金色
      if (settings.bgEffect === 'cny-rain' || settings.bgEffect === 'usd-rain' || settings.bgEffect === 'coin-svg') {
        item.style.color = '#FFD700';
      } else {
        item.style.color = '#FFF';
      }
      item.style.animationDuration = (6 + Math.random() * 4) + 's';
      document.body.appendChild(item);
      setTimeout(() => item.remove(), 12000);
    }

    function startEffect() {
      if (!settings.effectEnabled || effectInterval || settings.bgEffect === 'none') return;
      for (let i = 0; i < 20; i++) setTimeout(createFallingItem, i * 200);
      effectInterval = setInterval(createFallingItem, 500);
    }

    function stopEffect() {
      if (effectInterval) { clearInterval(effectInterval); effectInterval = null; }
      document.querySelectorAll('.falling-item').forEach(c => c.remove());
    }

    function startFullscreen() {
      appContainer.classList.add('fullscreen-mode');
      document.getElementById('backBtn').classList.add('active');
      document.getElementById('fullscreenBtn').classList.add('active');
      if (settings.bgEffect !== 'none') startEffect();
      startDisplay();
    }

    function startScreensaver() {
      appContainer.classList.add('fullscreen-mode');
      document.getElementById('backBtn').classList.add('active');
      document.getElementById('fullscreenBtn').classList.add('active');
      document.documentElement.requestFullscreen().catch(() => {});
      const hint = document.getElementById('screensaverHint');
      hint.style.display = 'block';
      setTimeout(() => hint.style.opacity = '0', 3000);
      if (settings.bgEffect !== 'none') startEffect();
      startDisplay();
    }

    function startDisplay() {
      updateSettings();
      isRunning = true;
      lastEarned = 0;
      
      // 在全屏模式下显示多档位工资和进度条
      if (appContainer.classList.contains('fullscreen-mode')) {
        document.getElementById('salaryGrid').style.display = 'grid';
        document.getElementById('progressContainer').style.display = 'block';
      }
      
      updateDisplay();
      updateInterval = setInterval(updateDisplay, 1000);
    }

    function stopFullscreen() {
      isRunning = false;
      clearInterval(updateInterval);
      stopEffect();
      appContainer.classList.remove('fullscreen-mode');
      document.getElementById('backBtn').classList.remove('active');
      document.getElementById('fullscreenBtn').classList.remove('active');
      document.getElementById('screensaverHint').style.display = 'none';
      document.getElementById('salaryGrid').style.display = 'none';
      document.getElementById('progressContainer').style.display = 'none';
      if (document.fullscreenElement) document.exitFullscreen();
    }

    function updateDisplay() {
      const now = new Date();
      const t = now;
      
      document.getElementById('timeDisplay').textContent = 
        `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')}`;
      
      const wk = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
      document.getElementById('dateDisplay').textContent = 
        `${t.getFullYear()}年${t.getMonth()+1}月${t.getDate()}日 ${wk[t.getDay()]}`;
      
      const daysInMonth = new Date(t.getFullYear(), t.getMonth() + 1, 0).getDate();
      const dailySalary = settings.monthlySalary / daysInMonth;
      const symbol = settings.currency === 'CNY' ? '¥' : '$';
      
      let secondsWorked = 0, shouldCalc = false;
      
      if (settings.calcMode === '24h') {
        secondsWorked = t.getHours() * 3600 + t.getMinutes() * 60 + t.getSeconds();
        shouldCalc = true;
      } else {
        // 判断工作日
        let isWorkDay = false;
        if (settings.workDays === 'double') {
          isWorkDay = t.getDay() !== 0 && t.getDay() !== 6;
        } else if (settings.workDays === 'single') {
          isWorkDay = t.getDay() !== 0;
        } else {
          isWorkDay = settings.customWorkDays.includes(t.getDay());
        }
        
        if (isWorkDay) {
          const [sh, sm] = settings.workStartTime.split(':').map(Number);
          const [eh, em] = settings.workEndTime.split(':').map(Number);
          const [ls, le] = [settings.lunchStartTime, settings.lunchEndTime].map(v => v.split(':').map(Number));
          const s = t.getHours() * 3600 + t.getMinutes() * 60;
          const ws = sh * 3600 + sm * 60, we = eh * 3600 + em * 60;
          const lsT = ls[0] * 3600 + ls[1] * 60, leT = le[0] * 3600 + le[1] * 60;
          const lunch = leT - lsT;
          if (s >= ws && s <= we) {
            secondsWorked = s <= lsT ? s - ws : (s >= leT ? s - ws - lunch : lsT - ws);
            shouldCalc = true;
          } else if (s > we) {
            secondsWorked = we - ws - lunch;
            shouldCalc = true;
          }
        }
      }
      
      const perSec = settings.calcMode === '24h' ? dailySalary / 86400 : dailySalary / (9 * 3600 - 90 * 60);
      const earned = shouldCalc ? perSec * secondsWorked : 0;
      
      document.getElementById('amountDisplay').textContent = `${symbol}${earned.toFixed(2)}`;
      document.getElementById('rateDisplay').textContent = `每秒 ${symbol}${perSec.toFixed(4)}`;
      document.querySelector('.coin-icon text').textContent = symbol;
      
      // 多档位工资显示（仅在全屏模式）
      if (isRunning) {
        document.getElementById('secondSalary').textContent = `${symbol}${perSec.toFixed(4)}`;
        document.getElementById('hourSalary').textContent = `${symbol}${(perSec * 3600).toFixed(2)}`;
        document.getElementById('daySalary').textContent = `${symbol}${dailySalary.toFixed(2)}`;
        document.getElementById('monthSalary').textContent = `${symbol}${settings.monthlySalary.toFixed(2)}`;
        
        // 计算工作进度
        let progressPercent = 0;
        if (settings.calcMode === 'work') {
          const [sh, sm] = settings.workStartTime.split(':').map(Number);
          const [eh, em] = settings.workEndTime.split(':').map(Number);
          const [ls, le] = [settings.lunchStartTime, settings.lunchEndTime].map(v => v.split(':').map(Number));
          const totalWorkSeconds = (eh * 3600 + em * 60) - (sh * 3600 + sm * 60) - ((le[0] * 3600 + le[1] * 60) - (ls[0] * 3600 + ls[1] * 60));
          progressPercent = Math.min(100, (secondsWorked / totalWorkSeconds) * 100);
        } else {
          progressPercent = ((t.getHours() * 3600 + t.getMinutes() * 60 + t.getSeconds()) / 86400) * 100;
        }
        document.getElementById('progressFill').style.width = progressPercent + '%';
        document.getElementById('progressLabel').textContent = `已工作 ${Math.floor(secondsWorked/3600)}小时 ${Math.floor((secondsWorked%3600)/60)}分`;
      }
      
      if (settings.soundEnabled && isRunning) {
        const stepVal = settings.currency === 'CNY' ? settings.soundStep : settings.soundStep * 7;
        if (Math.floor(earned / stepVal) > Math.floor(lastEarned / stepVal)) {
          playCoinSound();
          createFallingItem();
        }
      }
      lastEarned = earned;
      
      const hw = Math.floor(secondsWorked / 3600), mw = Math.floor((secondsWorked % 3600) / 60);
      document.getElementById('workStatus').textContent = `已工作 ${hw}小时 ${mw}分`;
      document.getElementById('calcModeDisplay').textContent = settings.calcMode === '24h' ? '24小时' : '工作时间';
    }

    updateSettings();
    // 初始化时启动背景特效
    if (settings.effectEnabled && settings.bgEffect !== 'none') {
      startEffect();
    }
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
