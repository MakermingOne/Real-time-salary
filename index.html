<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>实时工资</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000;
      --bg-secondary: #1c1c1e;
      --text-primary: #fff;
      --text-secondary: #8e8e93;
      --accent: #34c759;
      --card-bg: rgba(255,255,255,0.1);
      --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Noto Sans SC', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .app-container { display: flex; height: 100vh; }

    .settings-panel {
      width: 400px;
      min-width: 400px;
      background: var(--bg-secondary);
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .settings-panel h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 14px 16px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }

    .form-group input:focus { border-color: var(--accent); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .radio-group { display: flex; gap: 12px; flex-wrap: wrap; }

    .radio-option {
      flex: 1;
      min-width: 80px;
      position: relative;
    }

    .radio-option input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }

    .radio-option label {
      display: block;
      padding: 12px 10px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
    }

    .radio-option input:checked + label {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-secondary { background: var(--card-bg); }

    .effect-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .effect-btn {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      border: 2px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: transform 0.2s;
      background: var(--card-bg);
    }

    .effect-btn:hover { transform: scale(1.05); }
    .effect-btn.active { border-color: var(--accent); }

    .effect-none { background: #222; color: #666; }
    .effect-rain { background: linear-gradient(135deg, #1a1a2e, #16213e); }
    .effect-sparkle { background: linear-gradient(135deg, #2d1b4e, #1a0a2e); }
    .effect-flow { background: linear-gradient(135deg, #0f2027, #203a43); }
    .effect-swirl { background: linear-gradient(135deg, #1e3c72, #2a5298); }
    .effect-fire { background: linear-gradient(135deg, #200122, #6f0000); }

    .label-row { display: flex; align-items: center; justify-content: space-between; }

    .help-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text-secondary);
      color: var(--bg-secondary);
      font-size: 12px;
      font-weight: bold;
      cursor: help;
      margin-left: 8px;
      position: relative;
    }

    .help-tooltip {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 8px;
      padding: 12px;
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-primary);
      width: 260px;
      text-align: left;
      z-index: 1000;
      display: none;
      line-height: 1.5;
    }

    .help-icon:hover .help-tooltip { display: block; }

    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .preview-panel .time-display {
      font-size: 24px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .preview-panel .date-display {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 60px;
    }

    .preview-panel .coin-icon {
      width: 120px;
      height: 120px;
      margin-bottom: 30px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .preview-panel .amount-display {
      font-size: 72px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
    }

    .preview-panel .rate-display {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 50px;
    }

    .preview-panel .status-bar {
      display: flex;
      gap: 30px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .preview-panel .status-item { display: flex; align-items: center; gap: 6px; }

    .preview-panel .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .fullscreen-mode .settings-panel { display: none; }
    .fullscreen-mode .preview-panel { width: 100vw; }

    .back-btn, .fullscreen-btn {
      position: fixed;
      width: 44px;
      height: 44px;
      background: var(--card-bg);
      border: none;
      border-radius: 50%;
      color: var(--text-primary);
      font-size: 20px;
      cursor: pointer;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .back-btn.active, .fullscreen-btn.active { display: flex; }
    .back-btn { top: 20px; left: 20px; }
    .fullscreen-btn { top: 20px; right: 20px; }

    .screen-saver-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .falling-coin {
      position: fixed;
      width: 30px;
      height: 30px;
      pointer-events: none;
      z-index: 1;
    }

    .effect-rain .falling-coin { animation: fall-rain 8s linear infinite; opacity: 0.3; }
    .effect-sparkle .falling-coin { animation: fall-sparkle 4s ease-out infinite; }
    .effect-flow .falling-coin { animation: fall-flow 6s linear infinite; opacity: 0.4; }
    .effect-swirl .falling-coin { animation: fall-swirl 5s linear infinite; }
    .effect-fire .falling-coin { animation: fall-fire 3s ease-out infinite; }

    @keyframes fall-rain {
      0% { transform: translateY(-30px) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(360deg); }
    }
    @keyframes fall-sparkle {
      0% { transform: translateY(-30px) scale(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(50vh) scale(1); opacity: 0; }
    }
    @keyframes fall-flow {
      0% { transform: translateY(-30px) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(100vh) translateX(50px); opacity: 0; }
    }
    @keyframes fall-swirl {
      0% { transform: translateY(-30px) rotate(0deg) scale(0.5); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(100vh) rotate(720deg) scale(1); opacity: 0; }
    }
    @keyframes fall-fire {
      0% { transform: translateY(-30px) scale(0.3); opacity: 0; }
      50% { opacity: 1; filter: blur(0); }
      100% { transform: translateY(30vh) scale(1.5); opacity: 0; filter: blur(4px); }
    }

    .sound-toggle {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sound-toggle input[type="checkbox"] {
      width: 50px;
      height: 28px;
      appearance: none;
      background: var(--card-bg);
      border-radius: 14px;
      position: relative;
      cursor: pointer;
    }

    .sound-toggle input[type="checkbox"]::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.3s;
    }

    .sound-toggle input[type="checkbox"]:checked { background: var(--accent); }
    .sound-toggle input[type="checkbox"]:checked::after { transform: translateX(22px); }

    body.effect-rain { background: linear-gradient(135deg, #1a1a2e, #16213e); }
    body.effect-sparkle { background: linear-gradient(135deg, #2d1b4e, #1a0a2e); }
    body.effect-flow { background: linear-gradient(135deg, #0f2027, #203a43); }
    body.effect-swirl { background: linear-gradient(135deg, #1e3c72, #2a5298); }
    body.effect-fire { background: linear-gradient(135deg, #200122, #6f0000); }

    @media (max-width: 900px) {
      .app-container { flex-direction: column; }
      .settings-panel { width: 100%; height: auto; max-height: 50vh; }
      .preview-panel { padding: 20px; }
      .preview-panel .coin-icon { width: 80px; height: 80px; }
      .preview-panel .amount-display { font-size: 48px; }
    }

    @media (max-width: 480px) {
      .settings-panel { padding: 16px; }
      .preview-panel .coin-icon { width: 60px; height: 60px; }
      .preview-panel .amount-display { font-size: 36px; }
      .preview-panel .time-display { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="app-container" id="appContainer">
    <div class="settings-panel">
      <h2>💰 实时工资</h2>
      
      <div class="form-group">
        <label>月薪</label>
        <div class="form-row">
          <input type="number" id="monthlySalary" value="10000" style="flex: 2;">
          <select id="currency" style="flex: 1;">
            <option value="CNY">人民币 (¥)</option>
            <option value="USD">美元 ($)</option>
          </select>
        </div>
      </div>
      
      <div class="form-group">
        <div class="label-row">
          <label>收入计算方式</label>
          <div class="help-icon">?
            <div class="help-tooltip">
              <p><strong>24小时计算：</strong>月薪÷当月自然天数÷86400秒，从0点开始计算。</p>
              <p><strong>工作时间计算：</strong>仅在上班时间计算收入，周末和午休不计算。</p>
            </div>
          </div>
        </div>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" name="calcMode" id="calc24h" value="24h" checked>
            <label for="calc24h">24小时</label>
          </div>
          <div class="radio-option">
            <input type="radio" name="calcMode" id="calcWork" value="work">
            <label for="calcWork">工作时间</label>
          </div>
        </div>
      </div>
      
      <div id="workTimeSettings" style="display: none;">
        <div class="form-row">
          <div class="form-group">
            <label>上班</label>
            <input type="time" id="workStartTime" value="09:30">
          </div>
          <div class="form-group">
            <label>下班</label>
            <input type="time" id="workEndTime" value="19:00">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>午休开始</label>
            <input type="time" id="lunchStartTime" value="12:30">
          </div>
          <div class="form-group">
            <label>午休结束</label>
            <input type="time" id="lunchEndTime" value="14:00">
          </div>
        </div>
      </div>
      
      <div class="form-group">
        <label>时区</label>
        <select id="timezone">
          <option value="8" selected>北京 (UTC+8)</option>
          <option value="0">伦敦 (UTC+0)</option>
          <option value="-5">纽约 (UTC-5)</option>
          <option value="9">东京 (UTC+9)</option>
          <option value="-8">洛杉矶 (UTC-8)</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>背景特效</label>
        <div class="effect-selector">
          <div class="effect-btn effect-none" data-effect="none" title="无">✕</div>
          <div class="effect-btn effect-rain active" data-effect="rain" title="金币雨">💰</div>
          <div class="effect-btn effect-sparkle" data-effect="sparkle" title="星光">✨</div>
          <div class="effect-btn effect-flow" data-effect="flow" title="流水">🌊</div>
          <div class="effect-btn effect-swirl" data-effect="swirl" title="旋涡">🌀</div>
          <div class="effect-btn effect-fire" data-effect="fire" title="火焰">🔥</div>
        </div>
      </div>
      
      <div class="form-group">
        <label>金币音效</label>
        <div class="sound-toggle">
          <input type="checkbox" id="soundEnabled" checked>
          <span>启用音效</span>
        </div>
      </div>
      
      <button class="btn" id="completeBtn">完成设置</button>
      <button class="btn btn-secondary" id="screensaverBtn">进入屏保</button>
    </div>
    
    <div class="preview-panel" id="previewPanel">
      <div class="time-display" id="timeDisplay">09:00:00</div>
      <div class="date-display" id="dateDisplay">2024年1月1日 星期一</div>
      
      <svg class="coin-icon" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD700"/>
            <stop offset="50%" style="stop-color:#FFA500"/>
            <stop offset="100%" style="stop-color:#FFD700"/>
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="45" fill="url(#coinGradient)" stroke="#DAA520" stroke-width="2"/>
        <circle cx="50" cy="50" r="35" fill="none" stroke="#DAA520" stroke-width="1" stroke-dasharray="5,3"/>
        <text x="50" y="58" text-anchor="middle" font-size="24" font-weight="bold" fill="#8B4513">¥</text>
      </svg>
      
      <div class="amount-display" id="amountDisplay">¥0.00</div>
      <div class="rate-display" id="rateDisplay">每秒收入 ¥0.0000</div>
      
      <div class="status-bar">
        <div class="status-item">
          <div class="status-dot"></div>
          <span>实时计算中</span>
        </div>
        <div class="status-item" id="workStatus">已工作 0 小时 0 分</div>
        <div class="status-item" id="calcModeDisplay">24小时</div>
      </div>
    </div>
  </div>
  
  <button class="back-btn" id="backBtn">←</button>
  <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>
  <div class="screen-saver-hint" id="screensaverHint">按 ESC 退出</div>

  <script>
    let settings = {
      monthlySalary: 10000,
      currency: 'CNY',
      workStartTime: '09:30',
      workEndTime: '19:00',
      lunchStartTime: '12:30',
      lunchEndTime: '14:00',
      calcMode: '24h',
      timezone: 8,
      bgEffect: 'rain',
      soundEnabled: true,
      soundStep: 10
    };

    let updateInterval = null;
    let isRunning = false;
    let lastEarned = 0;
    let audioContext = null;
    let effectInterval = null;

    const appContainer = document.getElementById('appContainer');
    const soundEnabled = document.getElementById('soundEnabled');
    const workTimeSettings = document.getElementById('workTimeSettings');

    document.querySelectorAll('input[name="calcMode"]').forEach(radio => {
      radio.addEventListener('change', () => {
        workTimeSettings.style.display = radio.value === 'work' ? 'block' : 'none';
        settings.calcMode = radio.value;
        if (!isRunning) updateDisplay();
      });
    });

    soundEnabled.addEventListener('change', () => {
      settings.soundEnabled = soundEnabled.checked;
    });

    document.querySelectorAll('.effect-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.effect-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        settings.bgEffect = btn.dataset.effect;
        applyEffect(settings.bgEffect);
        if (!isRunning) updateDisplay();
      });
    });

    function applyEffect(effect) {
      document.body.className = '';
      if (effect !== 'none') {
        document.body.classList.add('effect-' + effect);
      }
    }

    document.querySelectorAll('#appContainer input, #appContainer select').forEach(input => {
      input.addEventListener('change', updateSettings);
      input.addEventListener('input', updateSettings);
    });

    function getWorkingDaysInMonth(year, month) {
      let workingDays = 0;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        if (date.getDay() !== 0 && date.getDay() !== 6) workingDays++;
      }
      return workingDays;
    }

    function updateSettings() {
      settings.monthlySalary = parseFloat(document.getElementById('monthlySalary').value) || 10000;
      settings.currency = document.getElementById('currency').value;
      settings.workStartTime = document.getElementById('workStartTime').value || '09:30';
      settings.workEndTime = document.getElementById('workEndTime').value || '19:00';
      settings.lunchStartTime = document.getElementById('lunchStartTime').value || '12:30';
      settings.lunchEndTime = document.getElementById('lunchEndTime').value || '14:00';
      settings.calcMode = document.querySelector('input[name="calcMode"]:checked').value;
      settings.timezone = parseInt(document.getElementById('timezone').value);
      
      workTimeSettings.style.display = settings.calcMode === 'work' ? 'block' : 'none';
      if (!isRunning) updateDisplay();
    }

    document.getElementById('completeBtn').addEventListener('click', startFullscreen);
    document.getElementById('screensaverBtn').addEventListener('click', startScreensaver);
    document.getElementById('backBtn').addEventListener('click', stopFullscreen);
    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isRunning) {
        if (document.fullscreenElement) document.exitFullscreen();
        stopFullscreen();
      }
    });

    function playCoinSound() {
      if (!settings.soundEnabled) return;
      try {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.setValueAtTime(880, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1760, audioContext.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + 0.3);
      } catch(e) {}
    }

    function createFallingCoin() {
      const coin = document.createElement('div');
      coin.className = 'falling-coin';
      coin.innerHTML = `<svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
        <circle cx="50" cy="50" r="35" fill="none" stroke="#DAA520" stroke-width="1"/>
        <text x="50" y="58" text-anchor="middle" font-size="24" font-weight="bold" fill="#8B4513">¥</text>
      </svg>`;
      coin.style.left = Math.random() * (window.innerWidth - 30) + 'px';
      coin.style.top = '-30px';
      coin.style.animationDuration = (4 + Math.random() * 4) + 's';
      document.body.appendChild(coin);
      setTimeout(() => coin.remove(), 10000);
    }

    function startEffect() {
      if (effectInterval || settings.bgEffect === 'none') return;
      for (let i = 0; i < 15; i++) setTimeout(createFallingCoin, i * 400);
      effectInterval = setInterval(createFallingCoin, 800);
    }

    function stopEffect() {
      if (effectInterval) { clearInterval(effectInterval); effectInterval = null; }
      document.querySelectorAll('.falling-coin').forEach(c => c.remove());
    }

    function startFullscreen() {
      appContainer.classList.add('fullscreen-mode');
      document.getElementById('backBtn').classList.add('active');
      document.getElementById('fullscreenBtn').classList.add('active');
      if (settings.bgEffect !== 'none') startEffect();
      startDisplay();
    }

    function startScreensaver() {
      appContainer.classList.add('fullscreen-mode');
      document.getElementById('backBtn').classList.add('active');
      document.getElementById('fullscreenBtn').classList.add('active');
      document.documentElement.requestFullscreen().catch(() => {});
      const hint = document.getElementById('screensaverHint');
      hint.style.display = 'block';
      setTimeout(() => hint.style.opacity = '0', 3000);
      if (settings.bgEffect !== 'none') startEffect();
      startDisplay();
    }

    function startDisplay() {
      updateSettings();
      isRunning = true;
      lastEarned = 0;
      updateDisplay();
      updateInterval = setInterval(updateDisplay, 1000);
    }

    function stopFullscreen() {
      isRunning = false;
      clearInterval(updateInterval);
      stopEffect();
      appContainer.classList.remove('fullscreen-mode');
      document.getElementById('backBtn').classList.remove('active');
      document.getElementById('fullscreenBtn').classList.remove('active');
      document.getElementById('screensaverHint').style.display = 'none';
      if (document.fullscreenElement) document.exitFullscreen();
    }

    function updateDisplay() {
      const now = new Date();
      const tz = settings.timezone * 3600000;
      const local = now.getTimezoneOffset() * 60000;
      const t = new Date(now.getTime() + local + tz);
      
      document.getElementById('timeDisplay').textContent = 
        `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')}`;
      
      const wk = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
      document.getElementById('dateDisplay').textContent = 
        `${t.getFullYear()}年${t.getMonth()+1}月${t.getDate()}日 ${wk[t.getDay()]}`;
      
      const daysInMonth = new Date(t.getFullYear(), t.getMonth() + 1, 0).getDate();
      const dailySalary = settings.monthlySalary / daysInMonth;
      const symbol = settings.currency === 'CNY' ? '¥' : '$';
      
      let secondsWorked = 0, shouldCalc = false;
      
      if (settings.calcMode === '24h') {
        secondsWorked = t.getHours() * 3600 + t.getMinutes() * 60 + t.getSeconds();
        shouldCalc = true;
      } else {
        if (t.getDay() !== 0 && t.getDay() !== 6) {
          const [sh, sm] = settings.workStartTime.split(':').map(Number);
          const [eh, em] = settings.workEndTime.split(':').map(Number);
          const [ls, le] = [settings.lunchStartTime, settings.lunchEndTime].map(v => v.split(':').map(Number));
          const s = t.getHours() * 3600 + t.getMinutes() * 60;
          const ws = sh * 3600 + sm * 60, we = eh * 3600 + em * 60;
          const lsT = ls[0] * 3600 + ls[1] * 60, leT = le[0] * 3600 + le[1] * 60;
          const lunch = leT - lsT;
          if (s >= ws && s <= we) {
            secondsWorked = s <= lsT ? s - ws : (s >= leT ? s - ws - lunch : lsT - ws);
            shouldCalc = true;
          } else if (s > we) {
            secondsWorked = we - ws - lunch;
            shouldCalc = true;
          }
        }
      }
      
      const perSec = settings.calcMode === '24h' ? dailySalary / 86400 : dailySalary / ((9*3600 - 90*60));
      const earned = shouldCalc ? perSec * secondsWorked : 0;
      
      document.getElementById('amountDisplay').textContent = `${symbol}${earned.toFixed(2)}`;
      document.getElementById('rateDisplay').textContent = `每秒 ${symbol}${perSec.toFixed(4)}`;
      document.querySelector('.coin-icon text').textContent = symbol;
      
      if (settings.soundEnabled && isRunning) {
        const stepVal = settings.currency === 'CNY' ? settings.soundStep : settings.soundStep * 7;
        if (Math.floor(earned / stepVal) > Math.floor(lastEarned / stepVal)) {
          playCoinSound();
          createFallingCoin();
        }
      }
      lastEarned = earned;
      
      const hw = Math.floor(secondsWorked / 3600), mw = Math.floor((secondsWorked % 3600) / 60);
      document.getElementById('workStatus').textContent = `已工作 ${hw}小时 ${mw}分`;
      document.getElementById('calcModeDisplay').textContent = settings.calcMode === '24h' ? '24小时' : '工作时间';
    }

    applyEffect(settings.bgEffect);
    updateSettings();
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
